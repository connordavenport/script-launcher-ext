[REMEMBER]
rememberlast = 3

[EDITOR]
; options are either External or RoboFont
; External will use your external editor to open python scripts
; All ini files will open externally regardless...
; Not case senstive
textEditor = External

[PATHS]
extensionsdir = /Users/connor/Library/Application Support/RoboFont/plugins
scriptsdir = /Volumes/Work/Code/Scripts

[SEARCHLOCAL]
value = 0
searchupdir = 3

[TOOLS]
; limit == 0 maxes out at 15 so buttons dont get too tiny:)
display = false
limit = 0 

